[api]
enabled = true
port = 54421
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54422
major_version = 17

[studio]
enabled = true
port = 54423

[auth]
enabled = true
site_url = "https://insightreviews.com.au"
additional_redirect_urls = ["https://insightreviews.com.au/auth/confirm", "https://insightreviews.com.au/**"]

[auth.email]
enable_signup = true
double_confirm_changes = false
enable_confirmations = false
sender_name = "InsightReviews"

[auth.email.template.magic_link]
subject = "Your InsightReviews Login Link"
content_path = "./supabase/templates/magic-link.html"

[auth.email.template.confirmation]
subject = "Confirm Your InsightReviews Account"
content_path = "./supabase/templates/confirmation.html"

[auth.email.template.invite]
subject = "You've Been Invited to InsightReviews"
content_path = "./supabase/templates/invite.html"

[auth.external.google]
enabled = false

[storage]
enabled = true
file_size_limit = "10MB"

[analytics]
enabled = true
port = 54427

[inbucket]
enabled = true
port = 54424
smtp_port = 54425
pop3_port = 54426
