name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      deployment_url:
        description: 'Specific Vercel deployment URL to promote (leave empty for latest preview)'
        required: false
        type: string

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  ci:
    name: CI Checks
    uses: ./.github/workflows/ci.yml

  deploy-production:
    name: Promote to Production
    needs: ci
    runs-on: ubuntu-latest
    environment: production
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Promote to production
        run: |
          if [ -n "${{ inputs.deployment_url }}" ]; then
            echo "Promoting specific deployment: ${{ inputs.deployment_url }}"
            vercel promote "${{ inputs.deployment_url }}" --token=${{ secrets.VERCEL_TOKEN }}
          else
            echo "Promoting latest preview deployment to production..."
            LATEST=$(vercel ls --token=${{ secrets.VERCEL_TOKEN }} 2>/dev/null | grep -m1 'Preview' | awk '{print $2}')
            if [ -z "$LATEST" ]; then
              echo "Error: No preview deployment found to promote"
              exit 1
            fi
            echo "Found latest preview: $LATEST"
            vercel promote "$LATEST" --token=${{ secrets.VERCEL_TOKEN }}
          fi

      - name: Tag production release
        run: |
          TAG="prod-$(date -u +'%Y%m%d-%H%M%S')"
          git tag -a "$TAG" -m "Production deploy $TAG"
          git push origin "$TAG"
          echo "Tagged commit as: $TAG"

      - name: Verify production
        run: |
          echo "Production promotion complete."
          echo "Verify at: https://insightreviews.com.au"
