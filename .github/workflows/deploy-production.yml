name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      deployment_url:
        description: 'Specific Vercel deployment URL to promote (leave empty for latest preview)'
        required: false
        type: string

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  ci:
    name: CI Checks
    uses: ./.github/workflows/ci.yml

  deploy-production:
    name: Promote to Production
    needs: ci
    runs-on: ubuntu-latest
    environment: production
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Promote to production
        run: |
          if [ -n "${{ inputs.deployment_url }}" ]; then
            echo "Promoting specific deployment: ${{ inputs.deployment_url }}"
            vercel promote "${{ inputs.deployment_url }}" --token=${{ secrets.VERCEL_TOKEN }}
          else
            echo "Promoting latest preview deployment to production..."
            LATEST=$(vercel ls --token=${{ secrets.VERCEL_TOKEN }} 2>/dev/null | grep -m1 'Preview' | awk '{print $2}')
            if [ -z "$LATEST" ]; then
              echo "Error: No preview deployment found to promote"
              exit 1
            fi
            echo "Found latest preview: $LATEST"
            vercel promote "$LATEST" --token=${{ secrets.VERCEL_TOKEN }}
          fi

      - name: Tag production release
        run: |
          TAG="prod-$(date -u +'%Y%m%d-%H%M%S')"
          git tag -a "$TAG" -m "Production deploy $TAG"
          git push origin "$TAG"
          echo "Tagged commit as: $TAG"

      - name: Verify production
        run: |
          echo "Production promotion complete."
          echo "Verify at: https://insightreviews.com.au"

  e2e-production:
    name: E2E Tests (Production)
    needs: deploy-production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      E2E_BASE_URL: https://insightreviews.com.au
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.E2E_SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests against production
        run: npx playwright test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-production
          path: playwright-report/
          retention-days: 14

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;

            await github.rest.issues.create({
              owner,
              repo,
              title: `PRODUCTION E2E Tests Failed — ${new Date().toISOString().split('T')[0]}`,
              body: `## Production E2E Test Failure\n\n**Target:** https://insightreviews.com.au\n**Run:** ${runUrl}\n**Commit:** ${context.sha.slice(0, 7)}\n\n⚠️ **This is a production issue.** Please investigate immediately.\n\nCheck the [workflow run](${runUrl}) for details and the Playwright report artifact.\n\n---\n*Auto-generated by CI*`,
              labels: ['bug', 'e2e-failure', 'production'],
            });
