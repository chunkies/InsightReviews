name: E2E Tests

on:
  # Run after production deploy (CI passes on push to main)
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]
  # Run on PRs too
  pull_request:
    branches: [main]
  # Allow manual trigger with custom URL
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Base URL to test against (e.g. staging or prod URL)'
        required: false
        type: string

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    # Only run if CI succeeded (for workflow_run trigger)
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 15
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.E2E_SUPABASE_SERVICE_ROLE_KEY }}
      NEXT_PUBLIC_SITE_URL: ${{ inputs.base_url || secrets.E2E_BASE_URL || 'http://localhost:3000' }}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      STRIPE_PRICE_ID: ${{ secrets.STRIPE_PRICE_ID }}
      E2E_BASE_URL: ${{ inputs.base_url || secrets.E2E_BASE_URL || '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build app (local only)
        if: ${{ !env.E2E_BASE_URL }}
        run: npm run build

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const baseUrl = process.env.E2E_BASE_URL || 'localhost';

            await github.rest.issues.create({
              owner,
              repo,
              title: `E2E Tests Failed — ${new Date().toISOString().split('T')[0]}`,
              body: `## E2E Test Failure\n\n**Target:** ${baseUrl}\n**Run:** ${runUrl}\n**Commit:** ${context.sha.slice(0, 7)}\n\nPlease check the [workflow run](${runUrl}) for details and the Playwright report artifact.\n\n---\n*Auto-generated by CI*`,
              labels: ['bug', 'e2e-failure'],
            });
